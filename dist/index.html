    <!--
      TODO: [Kakao Map] Replace KAKAO_JS_KEY_PLACEHOLDER below with your real
      Kakao JavaScript App Key.

      Steps:
        1. Go to https://developers.kakao.com
        2. Create an application (or select existing)
        3. Go to: App Keys → JavaScript Key
        4. Under "Web Platform", add your deployed domain (e.g. wjetwtwj.gensparkclaw.com)
        5. Replace KAKAO_JS_KEY_PLACEHOLDER in the script src below with your key

      The onerror handler sets window.__kakaoMapFailed = true so the React
      component can gracefully show a fallback UI instead of crashing.
    -->
    <script>
      window.__kakaoMapFailed = false;
      window.__kakaoMapReady = false;
    </script>
    <!-- Kakao SDK (maps + auth) -->
    <script src="https://developers.kakao.com/sdk/js/kakao.min.js"></script>
    <script
      type="text/javascript"
      src="//dapi.kakao.com/v2/maps/sdk.js?appkey=6cf68fa163de5052959d09523518d941&libraries=services&autoload=false"
      onload="kakao.maps.load(function(){ window.__kakaoMapReady = true; })"
      onerror="window.__kakaoMapFailed = true"
    ></script>
    <script>
      // Initialize Kakao SDK for Auth
      window.addEventListener('load', function() {
        if (window.Kakao && !window.Kakao.isInitialized()) {
          window.Kakao.init('6cf68fa163de5052959d09523518d941');
